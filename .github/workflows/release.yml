name: Release Obsidian plugin

on:
  push:
    tags:
      - "*"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18.x"

      - name: Install dependencies
        run: npm install

      - name: Build plugin
        run: npm run build

      - name: Prepare release metadata
        id: meta
        shell: bash
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "zip_name=advanced-multi-column-${tag}.zip" >> "$GITHUB_OUTPUT"

          # Treat any non-stable tag as prerelease:
          # examples: 1.0.0b, 1.0.0-beta, 1.0.0-beta.1, 1.0.0-rc.1
          if [[ "$tag" =~ [A-Za-z] || "$tag" == *"-"* ]]; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate tag and manifest version
        shell: bash
        run: |
          tag="${{ steps.meta.outputs.tag }}"
          manifest_version="$(node -p "require('./manifest.json').version")"

          # Accept SemVer with optional prerelease/build metadata.
          semver_re='^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z\.-]+)?(\+[0-9A-Za-z\.-]+)?$'
          if [[ ! "$tag" =~ $semver_re ]]; then
            echo "Tag '$tag' is not valid SemVer."
            exit 1
          fi

          if [[ "$tag" != "$manifest_version" ]]; then
            echo "Tag '$tag' must match manifest.json version '$manifest_version'."
            exit 1
          fi

      - name: Create release assets
        shell: bash
        run: |
          # Create a release directory
          mkdir -p release
          
          # Copy main files
          cp main.js manifest.json styles.css release/
          
          # Create zip file for easy distribution
          cd release
          zip -r "../${{ steps.meta.outputs.zip_name }}" .
          cd ..

      - name: Create release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          tag="${{ steps.meta.outputs.tag }}"
          prerelease_flag=""
          if [[ "${{ steps.meta.outputs.is_prerelease }}" == "true" ]]; then
            prerelease_flag="--prerelease"
          fi

          # Create release with all assets
          gh release create "$tag" \
            --title "$tag" \
            --notes "Release $tag" \
            ${prerelease_flag} \
            main.js \
            manifest.json \
            styles.css \
            "${{ steps.meta.outputs.zip_name }}"
